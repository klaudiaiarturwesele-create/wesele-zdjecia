<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zdjęcia z wesela</title>

<style>
body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #fff8f2, #fde2e4);
    color: #5a3d3d;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
}

.container {
    width: 100%;
    max-width: 500px;
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

h1 {
    font-size: 4.6rem;
    margin-bottom: 10px;
}

p {
    font-size: 2.4rem;
}

input[type="file"] {
    width: 100%;
    font-size: 2.2rem;
    margin: 20px 0;
}

button {
    width: 100%;
    padding: 20px;
    font-size: 2.8rem;
    font-weight: bold;
    border: none;
    border-radius: 15px;
    background: #d4a373;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
    background: #bc8a5f;
}

#status {
    margin-top: 20px;
    font-size: 2.2rem;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>💍 Klaudia i Artur Wesele 25.07.26r </h1>

    <p>Dodaj swoje zdjęcia i podziel się wspomnieniami ❤️</p>

    <input[type="file"] { font-size: 1.8rem; }
           id="fileInput"
           accept="image/*"
           multiple>

    <button onclick="upload()">
        📷 Wyślij zdjęcia
    </button>

    <p id="status"></p>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxopdd7eglFYUu6JaCT8KLusYUY0_blze5BJkGnE7PDX7XSy2HvaYquDc3Wry4EpksK7g/exec";

async function upload() {
    const files = document.getElementById("fileInput").files;
    const status = document.getElementById("status");

    if (files.length === 0) {
        status.innerText = "Wybierz zdjęcia 📷";
        return;
    }

    status.innerText = "Wysyłanie... 📤";

    for (const file of files) {

        let base64;

        try {
            base64 = await new Promise((resolve, reject) => {
                const reader = new FileReader();

                reader.onload = function () {
                    resolve(reader.result.split(",")[1]);
                };

                reader.onerror = reject;

                reader.readAsDataURL(file);
            });
        } catch (err) {
            status.innerText = "Błąd odczytu zdjęcia ❌";
            return;
        }

        try {
            const response = await fetch(scriptURL, {
                method: "POST",
                headers: {
                    "Content-Type": "text/plain"
                },
                body: JSON.stringify({
                    image: base64,
                    mimeType: file.type,
                    filename: file.name
                })
            });

            if (!response.ok) {
                throw new Error("HTTP " + response.status);
            }

        } catch (err) {
            console.error(err);
            status.innerText = "Błąd wysyłania ❌";
            return;
        }
    }

    status.innerText = "Wysłano ❤️ Dziękujemy!";
}
</script>

</body>
</html>
