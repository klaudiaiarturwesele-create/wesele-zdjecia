<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Upload zdjęć</title>
</head>
<body>

<input type="file" id="fileInput" multiple accept="image/*">
<button onclick="upload()">Wyślij zdjęcia</button>

<p id="status"></p>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxopdd7eglFYUu6JaCT8KLusYUY0_blze5BJkGnE7PDX7XSy2HvaYquDc3Wry4EpksK7g/exec";

async function upload() {
  const files = document.getElementById("fileInput").files;
  const status = document.getElementById("status");

  if (files.length === 0) {
    status.innerText = "Wybierz zdjęcia 📷";
    return;
  }

  status.innerText = "Wysyłanie... 📤";

  for (const file of files) {
    try {
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => {
          const result = reader.result.split(",")[1];
          resolve(result);
        };

        reader.onerror = () => reject(reader.error);

        reader.readAsDataURL(file);
      });

      const res = await fetch(scriptURL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain"
        },
        body: JSON.stringify({
          image: base64,
          mimeType: file.type,
          filename: file.name
        })
      });

      if (!res.ok) {
        throw new Error(`Błąd serwera: ${res.status}`);
      }

    } catch (err) {
      console.error(err);
      status.innerText = "Błąd wysyłania ❌";
      return;
    }
  }

  status.innerText = "Wysłano ❤️ Dziękujemy!";
}
</script>

</body>
</html>
