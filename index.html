```html
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zdjęcia z wesela</title>

<style>
body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #fff8f2, #fde2e4);
    color: #5a3d3d;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
}

.container {
    width: 100%;
    max-width: 700px;
    background: rgba(255,255,255,0.95);
    padding: 50px 30px;
    border-radius: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

h1 {
    font-size: 4rem;
    margin-bottom: 20px;
}

.description {
    font-size: 2rem;
    margin-bottom: 40px;
}

#fileInput {
    display: none;
}

.file-button {
    display: block;
    width: 100%;
    box-sizing: border-box;
    padding: 30px;
    margin-bottom: 25px;
    background: #8fbc8f;
    color: white;
    border-radius: 20px;
    font-size: 2rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.file-button:hover {
    background: #78a878;
}

button {
    width: 100%;
    padding: 30px;
    border: none;
    border-radius: 20px;
    background: #d4a373;
    color: white;
    font-size: 2.2rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #bc8a5f;
}

#selectedFiles {
    margin-top: 20px;
    font-size: 1.6rem;
}

#status {
    margin-top: 30px;
    font-size: 2rem;
    font-weight: bold;
}

@media (max-width: 600px) {
    h1 {
        font-size: 3rem;
    }

    .description {
        font-size: 1.7rem;
    }

    .file-button,
    button {
        font-size: 1.8rem;
        padding: 25px;
    }

    #selectedFiles,
    #status {
        font-size: 1.5rem;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>💍 Klaudia i Artur Wesele 25.07.26r</h1>

    <p class="description">
        Dodaj swoje zdjęcia i podziel się wspomnieniami ❤️
    </p>

    <label for="fileInput" class="file-button">
        📷 Wybierz zdjęcia
    </label>

    <input
        type="file"
        id="fileInput"
        accept="image/*"
        multiple
    >

    <div id="selectedFiles"></div>

    <button onclick="upload()">
        ❤️ Wyślij zdjęcia
    </button>

    <div id="status"></div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxopdd7eglFYUu6JaCT8KLusYUY0_blze5BJkGnE7PDX7XSy2HvaYquDc3Wry4EpksK7g/exec";

document.getElementById("fileInput").addEventListener("change", function () {
    const files = this.files;
    const info = document.getElementById("selectedFiles");

    if (files.length === 0) {
        info.innerText = "";
    } else {
        info.innerText = "Wybrano zdjęć: " + files.length;
    }
});

async function upload() {
    const files = document.getElementById("fileInput").files;
    const status = document.getElementById("status");

    if (files.length === 0) {
        status.innerText = "Wybierz zdjęcia 📷";
        return;
    }

    status.innerText = "Wysyłanie... 📤";

    for (const file of files) {

        let base64;

        try {
            base64 = await new Promise((resolve, reject) => {
                const reader = new FileReader();

                reader.onload = function () {
                    resolve(reader.result.split(",")[1]);
                };

                reader.onerror = reject;

                reader.readAsDataURL(file);
            });

        } catch (err) {
            status.innerText = "Błąd odczytu zdjęcia ❌";
            return;
        }

        try {
            const response = await fetch(scriptURL, {
                method: "POST",
                headers: {
                    "Content-Type": "text/plain"
                },
                body: JSON.stringify({
                    image: base64,
                    mimeType: file.type,
                    filename: file.name
                })
            });

            if (!response.ok) {
                throw new Error();
            }

        } catch (err) {
            console.error(err);
            status.innerText = "Błąd wysyłania ❌";
            return;
        }
    }

    status.innerText = "Wysłano ❤️ Dziękujemy!";
}
</script>

</body>
</html>
