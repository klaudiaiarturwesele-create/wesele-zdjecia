<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Wesele - zdjęcia</title>
</head>
<body style="font-family: Arial; text-align:center; padding:40px;">

  <h1>📸 Wesele – prześlij zdjęcia</h1>

  <input type="file" id="fileInput" accept="image/*" multiple>
  <br><br>

  <button onclick="upload()">Wyślij zdjęcia</button>

  <p id="status"></p>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxpWGvpCU-dhkwd-9eggCN3ejsioZqSQYMuBdCIJY0gk4zgCcOxDd-IHtiSfVW8lLQkGg/exec";

    async function upload() {
      const files = document.getElementById('fileInput').files;
      const status = document.getElementById('status');

      for (let file of files) {
        const reader = new FileReader();

        reader.onload = async function(e) {
          const base64 = e.target.result.split(',')[1];

          await fetch(scriptURL, {
            method: "POST",
            body: JSON.stringify({
              image: base64,
              mimeType: file.type,
              filename: file.name
            })
          });
        };

        reader.readAsDataURL(file);
      }

      status.innerText = "Wysyłanie zakończone 🎉";
    }
  </script>

</body>
</html>
